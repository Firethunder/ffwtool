name: GCal Sync

on:
  schedule:
    - cron: '0 4 * * *' # Daily at 04:00 UTC
  workflow_dispatch: # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run GCal Sync
        run: npm run sync-gcal
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ffwtool/termine.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git stash
            git fetch origin
            if git show-ref --quiet refs/remotes/origin/chore/calendar; then
              git switch chore/calendar
            else
              git switch -c chore/calendar
            fi
            git stash pop
            git commit -m "chore(data): automated gcal sync"
            git push origin chore/calendar
          fi